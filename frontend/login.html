<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym App Login</title>
    <script src="helpers.js"></script>
    <script>
      if (loggedIn()) {
        window.location.href = "workouts.html";
      }
    </script>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #1e1e1e;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .login-container {
        background-color: #2d2d2d;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        width: 300px;
      }
      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: none;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #007acc;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background-color: #005f9e;
      }
      .signup-btn {
        background-color: #28a745;
        margin-top: 10px;
      }
      .signup-btn:hover {
        background-color: #218838;
      }
      #message {
        margin-top: 15px;
        text-align: center;
        font-size: 0.9em;
      }
      .error {
        color: #ff5555;
      }
      .success {
        color: #55ff55;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2>Login</h2>
      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Sign In</button>
        <button
          type="button"
          class="signup-btn"
          onclick="window.location.href = 'create-account.html'"
        >
          Sign Up
        </button>
      </form>
      <div id="message"></div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault(); // Prevent the default form submission (page reload)

          const user = document.getElementById("username").value;
          const pass = document.getElementById("password").value;
          const messageDiv = document.getElementById("message");

          // Send data to the PHP backend
          fetch("../backend/login.php", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              username: user,
              password: pass,
            }),
          })
            .then((response) => response.json())
            .then((data) => {
              if (data.status === "success") {
                // Save the username to the browser's local storage
                localStorage.setItem("gymUser", user);

                // Redirect to the new dashboard page
                window.location.href = "workouts.html";
              } else {
                messageDiv.className = "error";
                messageDiv.textContent = data.message;
              }
            })
            .catch((error) => {
              console.error("Error:", error);
              messageDiv.className = "error";
              messageDiv.textContent =
                "An error occurred connecting to the server.";
            });
        });
    </script>
  </body>
</html>
