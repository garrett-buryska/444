<!--Sets the layout for the profile page-->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile</title>
    <link rel="stylesheet" href="Style.css" />
  </head>

  <body>
    <script src="navbar.js"></script>
    <nav id="navbar"></nav>

    <main class="profile-page">
      <section class="profile-panel">
        <div class="profile-heading">
          <div class="profile-heading-copy">
            <h1>Your Profile</h1>
            <p class="profile-subtitle">
              Keep your basic gym information in one place.
            </p>
          </div>

          <div class="profile-actions">
            <button class="profile-save-button" type="button">
              Save Profile
            </button>
          </div>
        </div>

        <div class="profile-grid">
          <aside class="profile-summary">
            <div
              class="profile-avatar profile-avatar-inline"
              aria-label="Profile image preview"
            >
              <img id="profileImagePreview" alt="Profile preview" />
            </div>
            <h2>Profile Preview</h2>
            <p>Set up your member details and training level here.</p>
          </aside>

          <form class="profile-form">
            <section class="profile-section profile-section-main">
              <h2>Basic Info</h2>
              <div class="profile-field">
                <label for="username">Username</label>
                <input
                  class="profile-input"
                  id="username"
                  type="text"
                  readonly
                />
              </div>

              <div class="profile-field">
                <label for="name">Name</label>
                <input
                  class="profile-input"
                  id="name"
                  type="text"
                  placeholder="Enter your name"
                />
              </div>

              <div class="profile-field">
                <label for="img_url">Profile Image URL</label>
                <input
                  class="profile-input"
                  id="img_url"
                  type="url"
                  placeholder="Paste an image link"
                />
              </div>

              <div class="profile-row">
                <div class="profile-field">
                  <label for="dob">Date of Birth</label>
                  <input class="profile-input" id="dob" type="date" />
                </div>

                <div class="profile-field">
                  <label for="height">Height (in)</label>
                  <input
                    class="profile-input"
                    id="height"
                    type="number"
                    step="0.1"
                    placeholder="Height"
                  />
                </div>

                <div class="profile-field">
                  <label for="weight">Weight (lbs)</label>
                  <input
                    class="profile-input"
                    id="weight"
                    type="number"
                    step="0.1"
                    placeholder="Weight"
                  />
                </div>
              </div>
            </section>

            <section class="profile-section profile-section-skills">
              <h2>Skill Level</h2>
              <div class="skill-level-row">
                <button class="skill-chip" type="button">Beginner</button>
                <button class="skill-chip" type="button">Intermediate</button>
                <button class="skill-chip" type="button">Advanced</button>
              </div>
            </section>

            <p id="profileMessage" class="profile-message"></p>
          </form>
        </div>
      </section>
    </main>

    <script src="profile.js"></script>
  </body>
</html>
