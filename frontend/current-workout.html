<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jim's Gym - Current Workout</title>
    <link rel="stylesheet" href="Style.css" />
    <style>
      /* Lock the page to the screen height to prevent outer scrolling */
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      .main-content {
        display: flex;
        flex-direction: column;
        padding: 5px;
        box-sizing: border-box;
      }

      .workout-container {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        overflow: hidden;
        padding-bottom: 10px;
      }

      .page-title {
        margin: 5px 0;
        text-align: center;
        font-size: 1.3rem;
      }

      #workout-display {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        overflow-y: auto;
        flex-grow: 1;
        padding: 5px;
      }

      .card {
        padding: 8px;
        background: white;
        border-radius: 6px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .card h3 {
        margin: 0;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .card p {
        margin: 0;
        font-size: 0.85rem;
      }

      .info-btn {
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 50%;
        width: 18px;
        height: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 10px;
        font-weight: bold;
        flex-shrink: 0;
      }

      .info-container {
        display: none;
        background: #f4f4f4;
        padding: 5px;
        margin: 2px 0;
        border-radius: 4px;
        font-size: 0.85rem;
      }

      .set-row {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 6px;
        padding: 2px 0;
      }

      .set-label {
        min-width: 45px;
        font-weight: bold;
        font-size: 0.9rem;
      }
      .set-text-display {
        font-size: 0.9rem;
        color: #333;
        font-style: italic;
      }

      .btn-finish {
        width: 100%;
        cursor: pointer;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1.2rem;
        font-weight: bold;
        flex-shrink: 0;
      }

      @media (max-width: 768px) {
        #workout-display {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <script src="navbar.js"></script>
    <nav id="navbar"></nav>

    <div class="main-content">
      <div class="workout-container">
        <h1 class="page-title">Today's Session</h1>

        <div id="workout-display">
          <p>Loading your lifts...</p>
        </div>

        <button class="btn-finish" onclick="finishWorkout()">
          Finish Workout
        </button>
      </div>
    </div>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const workoutId = urlParams.get("id");
      const display = document.getElementById("workout-display");

      if (!workoutId) {
        display.innerHTML =
          "<div class='card'><h3>Error</h3><p>No workout ID provided.</p></div>";
      } else {
        fetchWorkoutData(workoutId);
      }

      async function fetchWorkoutData(id) {
        try {
          const response = await fetch(`../backend/get-workout-details.php?id=${id}`);
          const data = await response.json();

          if (data.error) throw new Error(data.error);

          if (data.length === 0) {
            display.innerHTML = "<div class='card'><p>No exercises found.</p></div>";
            return;
          }

          display.innerHTML = "";

          data.forEach((lift, index) => {
            const card = document.createElement("div");
            card.className = "card";
            const infoId = `info-${index}`;

            let setsHTML = "";
            lift.sets.forEach((set) => {
              const isChecked = set.completed ? "checked" : "";
              const doneClass = set.completed ? "done" : "";
              
              // Display logic: "10 Reps at 50 lbs"
              let displayText = set.set_text || "";
              if (set.weight && set.weight > 0) {
                  displayText += ` at ${set.weight} lbs`;
              }

              setsHTML += `
                <div class="set-row ${doneClass}">
                    <input type="checkbox" data-lift-id="${lift.liftID}" data-set-number="${set.set_number}" onchange="this.parentElement.classList.toggle('done')" ${isChecked}>
                    <span class="set-label">Set ${set.set_number}</span>
                    <span class="set-text-display">${displayText}</span>
                </div>
              `;
            });

            card.innerHTML = `
                <h3>${lift.activity_name} 
                    <button class="info-btn" onclick="toggleInfo('${infoId}')">i</button>
                </h3>
                <div id="${infoId}" class="info-container">
                    <p>${lift.description || "No description available."}</p>
                    ${lift.youtube_link ? `<a href="${lift.youtube_link}" target="_blank">Watch Tutorial</a>` : "No video available."}
                </div>
                <p><strong>Category:</strong> ${lift.main_muscle_group ? lift.main_muscle_group.toUpperCase() : "N/A"}</p>
                <div class="sets-list">
                    ${setsHTML}
                </div>
            `;
            display.appendChild(card);
          });
        } catch (err) {
          display.innerHTML = `<div class='card'><p>Error loading workout: ${err.message}</p></div>`;
        }
      }

      function toggleInfo(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === "block" ? "none" : "block";
      }

      async function finishWorkout() {
        const button = document.querySelector(".btn-finish");
        button.disabled = true;
        button.textContent = "Finishing...";

        const setsPayload = [];
        const checkboxes = document.querySelectorAll('#workout-display input[type="checkbox"]');

        checkboxes.forEach((cb) => {
          setsPayload.push({
            liftID: cb.dataset.liftId,
            set_number: cb.dataset.setNumber,
            completed: cb.checked,
          });
        });

        if (!workoutId) {
          alert("Workout ID is missing.");
          button.disabled = false;
          button.textContent = "Finish Workout";
          return;
        }

        try {
          const response = await fetch("../backend/finish-workout.php", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ workoutId: workoutId, sets: setsPayload }),
          });
          const result = await response.json();
          if (result.status === "success") {
            window.location.href = "workouts.html";
          } else {
            alert("Error: " + result.message);
            button.disabled = false;
            button.textContent = "Finish Workout";
          }
        } catch (error) {
          alert("An error occurred.");
          button.disabled = false;
          button.textContent = "Finish Workout";
        }
      }
    </script>
  </body>
</html>
