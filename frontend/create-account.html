<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym App - Create Account</title>
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-container large">
        <h2>Create Account</h2>
        <form id="createAccountForm" class="auth-form">
          <input
            type="text"
            id="username"
            class="auth-input"
            placeholder="Username"
            required
          />
          <input
            type="password"
            id="password"
            class="auth-input"
            placeholder="Password"
            required
          />
          <input
            type="text"
            id="name"
            class="auth-input"
            placeholder="Full Name"
            required
          />

          <input
            type="url"
            id="img_url"
            class="auth-input"
            placeholder="Profile Image URL (Optional)"
          />
          <img id="imgPreview" class="auth-image-preview" alt="Image Preview" />

          <input class="auth-input" id="dob" type="date" required />

          <div class="auth-row">
            <input
              type="number"
              id="weight"
              class="auth-input"
              placeholder="Weight (lbs)"
              step="0.1"
              required
            />
            <input
              type="number"
              id="height"
              class="auth-input"
              placeholder="Height (in)"
              step="0.1"
              required
            />
          </div>

          <select id="skill" class="auth-select" required>
            <option value="" disabled selected>Select Skill Level</option>
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
          </select>

          <button type="submit" class="auth-button">Register</button>
          <button
            type="button"
            class="auth-button secondary"
            onclick="window.location.href = 'login.html'"
          >
            Back to Login
          </button>
        </form>
        <div id="message" class="auth-message"></div>
      </div>
    </div>

    <script>
      const imgUrlInput = document.getElementById("img_url");
      const imgPreview = document.getElementById("imgPreview");

      // Listen for changes in the image URL input
      imgUrlInput.addEventListener("input", function () {
        if (this.value.trim() !== "") {
          imgPreview.src = this.value;
          imgPreview.style.display = "block";
        } else {
          imgPreview.style.display = "none";
        }
      });
      // Hide the image if the URL fails to load
      imgPreview.addEventListener("error", function () {
        imgPreview.style.display = "none";
      });

      document
        .getElementById("createAccountForm")
        .addEventListener("submit", function (e) {
          e.preventDefault(); // Prevent the default form submission

          const user = document.getElementById("username").value;
          const pass = document.getElementById("password").value;
          const name = document.getElementById("name").value;
          const imgUrl = document.getElementById("img_url").value;
          const dob = document.getElementById("dob").value;
          const weight = parseFloat(document.getElementById("weight").value);
          const height = parseFloat(document.getElementById("height").value);
          const skill = document.getElementById("skill").value;
          const messageDiv = document.getElementById("message");

          // Send data to the backend
          fetch("../backend/create-account.php", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            credentials: "include",
            body: JSON.stringify({
              username: user,
              password: pass,
              name: name,
              img_url: imgUrl,
              dob: dob,
              weight: weight,
              height: height,
              skill: skill,
            }),
          })
            .then((response) => response.json())
            .then((data) => {
              if (data.status === "success") {
                messageDiv.className = "auth-message success";
                messageDiv.textContent =
                  "Account created successfully! Redirecting to login...";
                setTimeout(() => {
                  window.location.href = "login.html";
                }, 2000);
              } else {
                messageDiv.className = "auth-message error";
                messageDiv.textContent = data.message || "Registration failed.";
              }
            })
            .catch((error) => {
              console.error("Error:", error);
              messageDiv.className = "auth-message error";
              messageDiv.textContent =
                "An error occurred connecting to the server.";
            });
        });
    </script>
  </body>
</html>
