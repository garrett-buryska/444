<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Maxes</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="activities-max.css" />
  </head>
  <body>
    <script src="navbar.js"></script>
    <nav id="navbar"></nav>

    <main class="page-container">
      <h1 class="page-title">Enter Your Maxes</h1>

      <input
        type="text"
        id="search-bar"
        placeholder="Search exercises..."
        onkeyup="filterActivities()"
      />
      <div class="grid-container" id="activity-body"></div>
    </main>

    <script src="activities-max.js"></script>
  </body>
</html>
