<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account</title>
    <link rel="stylesheet" href="Style.css" />
    <script src="login-auth-check.js"></script>
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-container large">
        <h2>Create Account</h2>
        <form id="createAccountForm" class="auth-form">
          <input
            type="text"
            id="username"
            class="auth-input"
            placeholder="Username"
            required
          />
          <input
            type="password"
            id="password"
            class="auth-input"
            placeholder="Password"
            required
          />
          <input
            type="text"
            id="name"
            class="auth-input"
            placeholder="Full Name"
            required
          />

          <input
            type="url"
            id="img_url"
            class="auth-input"
            placeholder="Profile Image URL (Optional)"
          />
          <input class="auth-input" id="dob" type="date" required />

          <div class="auth-row">
            <input
              type="number"
              id="weight"
              class="auth-input"
              placeholder="Weight (lbs)"
              step="0.1"
              required
            />
            <input
              type="number"
              id="height"
              class="auth-input"
              placeholder="Height (in)"
              step="0.1"
              required
            />
          </div>

          <select id="skill" class="auth-select" required>
            <option value="" disabled selected>Select Skill Level</option>
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
          </select>

          <button type="submit" class="auth-button">Register</button>
          <button
            type="button"
            class="auth-button secondary"
            onclick="window.location.href = 'login.html'"
          >
            Back to Login
          </button>
        </form>
        <div id="message" class="auth-message"></div>
      </div>
    </div>
    <script src="create-account.js"></script>
  </body>
</html>
