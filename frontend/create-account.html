<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym App - Create Account</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #1e1e1e;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .signup-container {
        background-color: #2d2d2d;
        padding: 3rem;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        width: 500px;
        max-width: 90%;
      }
      input,
      select {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: none;
        border-radius: 4px;
        box-sizing: border-box;
        background-color: #fff;
      }
      .row {
        display: flex;
        gap: 10px;
      }
      button {
        width: 100%;
        padding: 10px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 10px;
      }
      button:hover {
        background-color: #218838;
      }
      .login-btn {
        background-color: #6c757d;
      }
      .login-btn:hover {
        background-color: #5a6268;
      }
      #message {
        margin-top: 15px;
        text-align: center;
        font-size: 0.9em;
      }
      .error {
        color: #ff5555;
      }
      .success {
        color: #55ff55;
      }
      .image-preview {
        width: 100%;
        max-height: 250px;
        object-fit: contain;
        border-radius: 4px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="signup-container">
      <h2>Create Account</h2>
      <form id="createAccountForm">
        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <input type="text" id="name" placeholder="Full Name" required />

        <input
          type="url"
          id="img_url"
          placeholder="Profile Image URL (Optional)"
        />
        <img id="imgPreview" class="image-preview" alt="Image Preview" />

        <div class="row">
          <input
            type="number"
            id="weight"
            placeholder="Weight (lbs)"
            step="0.1"
            required
          />
          <input
            type="number"
            id="height"
            placeholder="Height (in)"
            step="0.1"
            required
          />
        </div>

        <select id="skill" required>
          <option value="" disabled selected>Select Skill Level</option>
          <option value="Beginner">Beginner</option>
          <option value="Intermediate">Intermediate</option>
          <option value="Advanced">Advanced</option>
        </select>

        <button type="submit">Register</button>
        <button
          type="button"
          class="login-btn"
          onclick="window.location.href = 'login.html'"
        >
          Back to Login
        </button>
      </form>
      <div id="message"></div>
    </div>

    <script>
      const imgUrlInput = document.getElementById("img_url");
      const imgPreview = document.getElementById("imgPreview");

      // Listen for changes in the image URL input
      imgUrlInput.addEventListener("input", function () {
        if (this.value.trim() !== "") {
          imgPreview.src = this.value;
          imgPreview.style.display = "block";
        } else {
          imgPreview.style.display = "none";
        }
      });
      // Hide the image if the URL fails to load
      imgPreview.addEventListener("error", function () {
        imgPreview.style.display = "none";
      });

      document
        .getElementById("createAccountForm")
        .addEventListener("submit", function (e) {
          e.preventDefault(); // Prevent the default form submission

          const user = document.getElementById("username").value;
          const pass = document.getElementById("password").value;
          const name = document.getElementById("name").value;
          const imgUrl = document.getElementById("img_url").value;
          const weight = parseFloat(document.getElementById("weight").value);
          const height = parseFloat(document.getElementById("height").value);
          const skill = document.getElementById("skill").value;
          const messageDiv = document.getElementById("message");

          // Send data to the backend
          fetch("../backend/create_account.php", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            credentials: "include",
            body: JSON.stringify({
              username: user,
              password: pass,
              name: name,
              img_url: imgUrl,
              weight: weight,
              height: height,
              skill: skill,
            }),
          })
            .then((response) => response.json())
            .then((data) => {
              if (data.status === "success") {
                messageDiv.className = "success";
                messageDiv.textContent =
                  "Account created successfully! Redirecting to login...";
                setTimeout(() => {
                  window.location.href = "login.html";
                }, 2000);
              } else {
                messageDiv.className = "error";
                messageDiv.textContent = data.message || "Registration failed.";
              }
            })
            .catch((error) => {
              console.error("Error:", error);
              messageDiv.className = "error";
              messageDiv.textContent =
                "An error occurred connecting to the server.";
            });
        });
    </script>
  </body>
</html>
